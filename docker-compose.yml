# SaaS Multi-Tenancy: set MAIN_DOMAIN to your base domain (e.g. yourdomain.com)
# For local dev, use lvh.me — all *.lvh.me subdomains resolve to 127.0.0.1 without any DNS setup.
# Example: tenant "demo" is accessible at http://demo.lvh.me:3000
x-main-domain: &main-domain
  MAIN_DOMAIN: ${MAIN_DOMAIN:-lvh.me:3000}
  NEXT_PUBLIC_MAIN_DOMAIN: ${NEXT_PUBLIC_MAIN_DOMAIN:-lvh.me:3000}

services:
  redis:
    image: redis:7-alpine
    container_name: bus-ticket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: bus-ticket-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bus_ticket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bus_ticket"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
