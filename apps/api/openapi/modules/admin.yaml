/api/v1/admin/stops:
  get:
    tags: [Admin - Stops]
    summary: List stops (admin)
    operationId: adminListStops
    security:
      - bearerAuth: []
      - cookieAuth: []
    responses:
      '200':
        description: Stops list
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items:
                    type: object
            examples:
              list:
                $ref: '../components/examples.yaml#/StopList'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'
  post:
    tags: [Admin - Stops]
    summary: Create stop
    operationId: adminCreateStop
    security:
      - bearerAuth: []
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, city, code]
            properties:
              name:
                type: string
              city:
                type: string
              code:
                type: string
                minLength: 2
                maxLength: 10
          examples:
            newStop:
              $ref: '../components/examples.yaml#/CreateStopRequest'
    responses:
      '201':
        description: Stop created
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
            examples:
              created:
                value:
                  data:
                    id: clxstop00000000000000000099
                    name: Aricha
                    city: Manikganj
                    code: ARC
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '409':
        $ref: '../components/common.yaml#/components/responses/Error409Conflict'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/admin/stops/{id}:
  patch:
    tags: [Admin - Stops]
    summary: Update stop
    operationId: adminUpdateStop
    security:
      - bearerAuth: []
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: clxstop00000000000000000001
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              city:
                type: string
              code:
                type: string
          examples:
            rename:
              value:
                name: Gabtoli Terminal
    responses:
      '200':
        description: Stop updated
        content:
          application/json:
            examples:
              updated:
                value:
                  data:
                    id: clxstop00000000000000000001
                    name: Gabtoli Terminal
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'
  delete:
    tags: [Admin - Stops]
    summary: Delete stop
    operationId: adminDeleteStop
    security:
      - bearerAuth: []
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Stop deleted
        content:
          application/json:
            examples:
              deleted:
                value:
                  data:
                    deleted: true
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

