/api/v1/admin/reports/sales:
  get:
    tags: [Admin - Reports]
    summary: Sales report
    operationId: adminSalesReport
    security:
      - bearerAuth: []
      - cookieAuth: []
    parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date-time
        example: "2026-05-01T00:00:00.000Z"
      - name: to
        in: query
        schema:
          type: string
          format: date-time
        example: "2026-05-20T23:59:59.999Z"
    responses:
      '200':
        description: Sales breakdown by channel and route
        content:
          application/json:
            examples:
              report:
                value:
                  data:
                    from: "2026-05-01T00:00:00.000Z"
                    to: "2026-05-20T23:59:59.999Z"
                    totalRevenue: 850000
                    ticketCount: 12
                    online:
                      count: 8
                      revenue: 600000
                    counter:
                      count: 4
                      revenue: 250000
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

