/api/v1/admin/reports/export/csv:
  get:
    tags: [Admin - Reports]
    summary: Export sales CSV
    operationId: adminExportSalesCsv
    security:
      - bearerAuth: []
      - cookieAuth: []
    parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        schema:
          type: string
