/api/v1/auth/register:
  post:
    tags: [Identity]
    summary: Register a new user
    operationId: register
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [phone, password]
            properties:
              phone:
                type: string
                minLength: 10
                maxLength: 15
                example: "01712345678"
              email:
                type: string
                format: email
                example: user@example.com
              password:
                type: string
                minLength: 6
                example: password123
              name:
                type: string
                example: Rahim Khan
          examples:
            default:
              $ref: '../components/examples.yaml#/RegisterRequest'
    responses:
      '200':
        description: User registered; JWT returned in body and cookie
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResultEnvelope'
            examples:
              registered:
                $ref: '../components/examples.yaml#/AuthSuccess'
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '409':
        $ref: '../components/common.yaml#/components/responses/Error409Conflict'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/auth/login:
  post:
    tags: [Identity]
    summary: Log in
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [phone, password]
            properties:
              phone:
                type: string
                example: "01700000001"
              password:
                type: string
                example: password123
          examples:
            admin:
              $ref: '../components/examples.yaml#/LoginRequest'
    responses:
      '200':
        description: Login success; JWT returned in body and cookie
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResultEnvelope'
            examples:
              admin:
                $ref: '../components/examples.yaml#/AuthSuccess'
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/auth/logout:
  post:
    tags: [Identity]
    summary: Log out
    operationId: logout
    responses:
      '200':
        description: Session cleared
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  properties:
                    ok:
                      type: boolean
                      example: true
            examples:
              loggedOut:
                value:
                  data:
                    ok: true
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/users/me:
  get:
    tags: [Identity]
    summary: Current user profile
    operationId: getCurrentUser
    security:
      - bearerAuth: []
      - cookieAuth: []
    responses:
      '200':
        description: Authenticated user profile
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/UserProfile'
            examples:
              admin:
                $ref: '../components/examples.yaml#/UserProfile'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/users/me/bookings:
  get:
    tags: [Identity]
    summary: Paginated booking history for current user
    operationId: listMyBookings
    security:
      - bearerAuth: []
      - cookieAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          example: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 10
          example: 10
    responses:
      '200':
        description: Paginated bookings
        content:
          application/json:
            schema:
              type: object
              required: [data, meta]
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/UserBookingSummary'
                meta:
                  $ref: '../components/common.yaml#/components/schemas/PaginationMeta'
            examples:
              empty:
                summary: No bookings yet
                value:
                  data: []
                  meta:
                    page: 1
                    pageSize: 10
                    total: 0
              withBookings:
                summary: One paid trip
                value:
                  data:
                    - id: clxbook0000000000000000001
                      status: PAID
                      totalAmount: 136000
                      createdAt: "2026-05-20T05:00:00.000Z"
                      routeSlug: dhaka-pabna
                      departureAt: "2026-05-21T00:00:00.000Z"
                      seatLabels: ["A1"]
                  meta:
                    page: 1
                    pageSize: 10
                    total: 1
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

components:
  schemas:
    AuthResultEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [token, user]
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      required: [id, phone, role]
      properties:
        id:
          type: string
          example: clxuser00000000000000000001
        phone:
          type: string
          example: "01700000001"
        email:
          type: string
          nullable: true
          example: admin@bus.local
        name:
          type: string
          nullable: true
          example: Admin User
        role:
          type: string
          enum: [USER, ADMIN, COUNTER_SELLER]
          example: ADMIN
    UserBookingSummary:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          example: PAID
        totalAmount:
          type: integer
          description: Minor currency units (poisa)
          example: 136000
        createdAt:
          type: string
          format: date-time
        routeSlug:
          type: string
          example: dhaka-pabna
        departureAt:
          type: string
          format: date-time
        seatLabels:
          type: array
          items:
            type: string
          example: ["A1"]
