/api/v1/admin/layouts:
  get:
    tags: [Admin - Layouts]
    summary: List seat layouts
    operationId: adminListLayouts
    security:
      - bearerAuth: []
      - cookieAuth: []
    responses:
      '200':
        description: Layouts with templates
        content:
          application/json:
            examples:
              list:
                value:
                  data:
                    - id: clxlayout00000000000000001
                      name: 40 Seat Standard
                      rows: 10
                      cols: 4
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'
  post:
    tags: [Admin - Layouts]
    summary: Create seat layout
    operationId: adminCreateLayout
    security:
      - bearerAuth: []
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, rows, cols, templates]
            properties:
              name:
                type: string
              rows:
                type: integer
              cols:
                type: integer
              templates:
                type: array
                items:
                  type: object
          examples:
            fourSeater:
              value:
                name: Mock 4-seat
                rows: 2
                cols: 2
                templates:
                  - { label: M1A, row: 1, col: 1, seatClass: STANDARD }
                  - { label: M1B, row: 1, col: 2, seatClass: STANDARD }
    responses:
      '201':
        description: Layout created
        content:
          application/json:
            examples:
              created:
                value:
                  data:
                    id: clxlayout00000000000000002
                    name: Mock 4-seat
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/admin/schedules:
  get:
    tags: [Admin - Schedules]
    summary: List schedules
    operationId: adminListSchedules
    security:
      - bearerAuth: []
      - cookieAuth: []
    responses:
      '200':
        description: Schedules
        content:
          application/json:
            examples:
              list:
                value:
                  data:
                    - id: clxsched000000000000000001
                      status: SCHEDULED
                      departureAt: "2026-05-21T00:00:00.000Z"
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'
  post:
    tags: [Admin - Schedules]
    summary: Create schedule and seat inventory
    operationId: adminCreateSchedule
    security:
      - bearerAuth: []
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [routeId, coachId, departureAt, estimatedArrivalAt, baseFare]
            properties:
              routeId:
                type: string
              coachId:
                type: string
              departureAt:
                type: string
                format: date-time
              estimatedArrivalAt:
                type: string
                format: date-time
              baseFare:
                type: integer
                description: Minor units
          examples:
            morningBus:
              value:
                routeId: clxroute000000000000000001
                coachId: clxcoach000000000000000001
                departureAt: "2026-05-22T00:00:00.000Z"
                estimatedArrivalAt: "2026-05-22T05:30:00.000Z"
                baseFare: 85000
    responses:
      '201':
        description: Schedule created with seat rows
        content:
          application/json:
            examples:
              created:
                value:
                  data:
                    id: clxsched000000000000000099
                    status: SCHEDULED
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/admin/schedules/{id}/reschedule:
  patch:
    tags: [Admin - Schedules]
    summary: Reschedule departure
    operationId: adminReschedule
    security:
      - bearerAuth: []
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [departureAt, estimatedArrivalAt]
            properties:
              departureAt:
                type: string
                format: date-time
              estimatedArrivalAt:
                type: string
                format: date-time
              reason:
                type: string
          examples:
            delay:
              value:
                departureAt: "2026-05-21T02:00:00.000Z"
                estimatedArrivalAt: "2026-05-21T07:30:00.000Z"
                reason: Traffic on highway
    responses:
      '200':
        description: Rescheduled
        content:
          application/json:
            examples:
              ok:
                value:
                  data:
                    id: clxsched000000000000000001
                    status: SCHEDULED
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '401':
        $ref: '../components/common.yaml#/components/responses/Error401Unauthorized'
      '403':
        $ref: '../components/common.yaml#/components/responses/Error403Forbidden'
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

