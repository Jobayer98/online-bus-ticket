openapi: 3.0.3
info:
  title: Online Bus Ticket API
  description: |
    SaaS bus ticketing platform API.

    ## Envelopes
    - **Success:** `{ "data": T }` or `{ "data": T[], "meta": { page, pageSize, total } }`
    - **Error:** `{ "error": { "code", "message", "details?" } }`

    ## Authentication
    Use **Bearer** `Authorization: Bearer <token>` (from login/register `data.token`) or the `token` httpOnly cookie.

    **Seed users:** Admin `01700000001` · Counter `01700000002` · password `password123`

    Modular spec files live under `openapi/modules/`.
  version: 1.0.0
  contact:
    name: API Team

servers:
  - url: http://localhost:4100
    description: Local development

tags:
  - name: Health
    description: Liveness and version
  - name: Identity
    description: Auth and user profile
  - name: Schedule
    description: Public schedule search
  - name: Booking
    description: Seat holds and bookings
  - name: Payment
    description: Payment initiate and confirm
  - name: Ticket
    description: Ticket lookup and download
  - name: Counter
    description: Counter POS operations
  - name: Admin - Stops
  - name: Admin - Routes
  - name: Admin - Coaches
  - name: Admin - Layouts
  - name: Admin - Schedules
  - name: Admin - Reports

