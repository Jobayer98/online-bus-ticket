/api/v1/bookings/hold:
  post:
    tags: [Booking]
    summary: Hold seats temporarily
    operationId: createHold
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateHoldRequest'
          examples:
            singleSeat:
              $ref: '../components/examples.yaml#/CreateHoldRequest'
    responses:
      '201':
        description: Hold created (5 minute selection TTL)
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/HoldDto'
            examples:
              created:
                $ref: '../components/examples.yaml#/HoldCreated'
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '409':
        $ref: '../components/common.yaml#/components/responses/Error409Conflict'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/bookings/hold/{id}:
  delete:
    tags: [Booking]
    summary: Release a seat hold
    operationId: releaseHold
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: clxhold0000000000000000001
    responses:
      '200':
        description: Hold released; seats returned to AVAILABLE
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  properties:
                    released:
                      type: boolean
                      example: true
            examples:
              released:
                value:
                  data:
                    released: true
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/bookings:
  post:
    tags: [Booking]
    summary: Create booking from hold
    operationId: createBooking
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateBookingRequest'
          examples:
            guest:
              $ref: '../components/examples.yaml#/CreateBookingRequest'
    responses:
      '201':
        description: Booking created from hold
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/BookingSummary'
            examples:
              created:
                $ref: '../components/examples.yaml#/BookingCreated'
      '400':
        $ref: '../components/common.yaml#/components/responses/Error400Validation'
      '409':
        $ref: '../components/common.yaml#/components/responses/Error409Conflict'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

/api/v1/bookings/{id}:
  get:
    tags: [Booking]
    summary: Get booking by ID
    operationId: getBooking
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: clxbook0000000000000000001
    responses:
      '200':
        description: Booking details
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: '#/components/schemas/BookingSummary'
            examples:
              held:
                value:
                  data:
                    id: clxbook0000000000000000001
                    status: HELD
                    totalAmount: 136000
                    passenger:
                      name: Karim Ahmed
                      phone: "01799998888"
      '404':
        $ref: '../components/common.yaml#/components/responses/Error404NotFound'
      '500':
        $ref: '../components/common.yaml#/components/responses/Error500Internal'

components:
  schemas:
    Passenger:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          example: Karim Ahmed
        phone:
          type: string
          example: "01799998888"
        email:
          type: string
          format: email
    CreateHoldRequest:
      type: object
      required: [scheduleId, seatLabels, sessionId]
      properties:
        scheduleId:
          type: string
        seatLabels:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
        sessionId:
          type: string
    CreateBookingRequest:
      type: object
      required: [holdId, boardingPointId, passenger]
      properties:
        holdId:
          type: string
        boardingPointId:
          type: string
        passenger:
          $ref: '#/components/schemas/Passenger'
    HoldDto:
      type: object
      properties:
        holdId:
          type: string
        expiresAt:
          type: string
          format: date-time
        seatLabels:
          type: array
          items:
            type: string
        totalAmount:
          type: integer
        lineItems:
          type: array
          items:
            type: object
    BookingSummary:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        totalAmount:
          type: integer
        passenger:
          $ref: '#/components/schemas/Passenger'
