services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: bus_saas
      POSTGRES_USER: bus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bus"]
      interval: 10s
      timeout: 5s
      retries: 5

    expose:
      - "5432"

    networks:
      - saas-network

    mem_limit: 256m

  redis:
    image: redis:7-alpine
    container_name: redis

    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    expose:
      - "6379"

    networks:
      - saas-network

    mem_limit: 128m

volumes:
  postgres_data:
  redis_data:

networks:
  saas-network:
    external: true
